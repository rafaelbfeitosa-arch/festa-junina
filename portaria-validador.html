<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portaria — Festa Junina</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap');

  :root {
    --azul:    #1a3a5c;
    --amarelo: #f39c12;
    --vermelho:#c0392b;
    --verde:   #27ae60;
    --creme:   #fdf6e3;
    --cinza:   #7f8c8d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #0d1f33;
    min-height: 100vh;
    color: #e0d8c8;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--azul);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--amarelo);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--amarelo);
    text-shadow: 1px 1px 0 var(--vermelho);
  }
  header p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    opacity: .5;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .contador-header {
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
  }
  .contador-header .num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--verde);
    line-height: 1;
  }
  .contador-header .lbl { font-size: 10px; opacity: .5; text-transform: uppercase; }

  /* ── Main ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    overflow: hidden;
  }
  @media(max-width: 700px) {
    main { grid-template-columns: 1fr; }
    .painel-log { display: none; }
  }

  /* ── Câmera ── */
  .painel-camera {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
    background: #0d1f33;
    border-right: 1px solid rgba(255,255,255,.07);
    gap: 16px;
  }

  .camera-wrap {
    position: relative;
    width: 100%;
    max-width: 360px;
    aspect-ratio: 1;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    border: 2px solid rgba(255,255,255,.1);
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  canvas#canvas { display: none; }

  /* Visor / mira */
  .visor {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .mira {
    width: 200px;
    height: 200px;
    position: relative;
  }
  .mira::before, .mira::after,
  .mira-bl::before, .mira-bl::after {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
  }
  .mira::before  { top: 0; left: 0;     border-top: 3px solid var(--amarelo); border-left: 3px solid var(--amarelo); border-radius: 4px 0 0 0; }
  .mira::after   { top: 0; right: 0;    border-top: 3px solid var(--amarelo); border-right: 3px solid var(--amarelo); border-radius: 0 4px 0 0; }
  .mira-bl::before { bottom: 0; left: 0;  border-bottom: 3px solid var(--amarelo); border-left: 3px solid var(--amarelo); border-radius: 0 0 0 4px; }
  .mira-bl::after  { bottom: 0; right: 0; border-bottom: 3px solid var(--amarelo); border-right: 3px solid var(--amarelo); border-radius: 0 0 4px 0; }

  .scan-line {
    position: absolute;
    width: 180px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--amarelo), transparent);
    top: 10px;
    left: 10px;
    animation: scanAnim 2s ease-in-out infinite;
    opacity: .8;
  }
  @keyframes scanAnim {
    0%   { top: 10px; }
    50%  { top: 180px; }
    100% { top: 10px; }
  }

  /* Flash de resultado */
  .flash {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity .1s;
    border-radius: 14px;
  }
  .flash.ok    { background: rgba(39,174,96,.35); opacity: 1; }
  .flash.erro  { background: rgba(192,57,43,.35); opacity: 1; }
  .flash.warn  { background: rgba(243,156,18,.35); opacity: 1; }

  /* Status câmera */
  .camera-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    opacity: .5;
    text-align: center;
    letter-spacing: 1px;
  }
  .camera-status.ativo { color: var(--verde); opacity: 1; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }

  /* Resultado principal */
  .resultado {
    width: 100%;
    max-width: 360px;
    border-radius: 14px;
    padding: 20px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: all .3s;
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(255,255,255,.04);
    min-height: 110px;
  }
  .resultado.ok    { background: rgba(39,174,96,.12);  border-color: rgba(39,174,96,.4); }
  .resultado.erro  { background: rgba(192,57,43,.12);  border-color: rgba(192,57,43,.4); }
  .resultado.warn  { background: rgba(243,156,18,.12); border-color: rgba(243,156,18,.4); }

  .res-icon { font-size: 40px; flex-shrink: 0; line-height: 1; }
  .res-body  { flex: 1; }
  .res-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-bottom: 4px;
  }
  .res-title.ok    { color: #5ddb8d; }
  .res-title.erro  { color: #e57373; }
  .res-title.warn  { color: var(--amarelo); }
  .res-nome  { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .res-detail {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    opacity: .6;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 2px;
  }

  /* Input manual */
  .manual-wrap {
    width: 100%;
    max-width: 360px;
  }
  .manual-wrap label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: .5;
    margin-bottom: 6px;
  }
  .manual-row { display: flex; gap: 8px; }
  .manual-row input {
    flex: 1;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 8px;
    color: #e0d8c8;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: border-color .2s;
  }
  .manual-row input:focus { border-color: var(--amarelo); }
  .manual-row button {
    background: var(--amarelo);
    color: #1a1a1a;
    border: none;
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 18px;
    cursor: pointer;
    transition: filter .15s;
  }
  .manual-row button:hover { filter: brightness(1.1); }

  /* Câmera botão iniciar */
  .btn-cam {
    background: var(--azul);
    border: 1px solid var(--amarelo);
    color: var(--amarelo);
    border-radius: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 24px;
    cursor: pointer;
    letter-spacing: .5px;
    transition: background .2s;
  }
  .btn-cam:hover { background: rgba(243,156,18,.15); }
  .btn-cam.parar { border-color: var(--vermelho); color: var(--vermelho); }
  .btn-cam.parar:hover { background: rgba(192,57,43,.15); }

  /* ── Painel log ── */
  .painel-log {
    display: flex;
    flex-direction: column;
    background: #0d1f33;
    overflow: hidden;
  }
  .log-header {
    padding: 16px 20px;
    background: rgba(255,255,255,.03);
    border-bottom: 1px solid rgba(255,255,255,.07);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .log-header h2 {
    font-family: 'Playfair Display', serif;
    color: var(--amarelo);
    font-size: 16px;
  }
  .log-header button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
    color: rgba(255,255,255,.5);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .log-stats {
    display: flex;
    gap: 0;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .log-stat {
    flex: 1;
    padding: 12px 16px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,.05);
  }
  .log-stat:last-child { border-right: none; }
  .log-stat .n {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
  }
  .log-stat .l { font-family:'IBM Plex Mono',monospace; font-size:10px; opacity:.4; text-transform:uppercase; }
  .n-ok     { color: var(--verde); }
  .n-erro   { color: var(--vermelho); }
  .n-warn   { color: var(--amarelo); }

  .log-lista {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .log-lista::-webkit-scrollbar { width: 4px; }
  .log-lista::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

  .log-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    animation: slideIn .25s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateX(10px); }
    to   { opacity:1; transform: translateX(0); }
  }
  .log-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-ok   { background: var(--verde); box-shadow: 0 0 6px var(--verde); }
  .dot-erro { background: var(--vermelho); box-shadow: 0 0 6px var(--vermelho); }
  .dot-warn { background: var(--amarelo); box-shadow: 0 0 6px var(--amarelo); }

  .log-item-body { flex: 1; min-width: 0; }
  .log-item-nome {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .log-item-detail {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    opacity: .45;
    margin-top: 1px;
  }
  .log-item-hora {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    opacity: .35;
    flex-shrink: 0;
  }

  .log-empty {
    text-align: center;
    padding: 60px 20px;
    opacity: .25;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }
  .log-empty .icon { font-size: 32px; margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <h1>🎪 Portaria</h1>
      <p>Validação de Ingressos</p>
    </div>
  </div>
  <div class="contador-header">
    <div class="num" id="cnt-ok">0</div>
    <div class="lbl">Entradas</div>
  </div>
</header>

<main>
  <!-- ── Câmera ── -->
  <div class="painel-camera">

    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="visor">
        <div class="mira">
          <div class="mira-bl"></div>
          <div class="scan-line" id="scan-line"></div>
        </div>
      </div>
      <div class="flash" id="flash"></div>
    </div>

    <div class="camera-status" id="camera-status">Câmera inativa</div>

    <div style="display:flex;gap:10px">
      <button class="btn-cam" id="btn-cam" onclick="toggleCamera()">📷 Iniciar Câmera</button>
    </div>

    <!-- Resultado -->
    <div class="resultado" id="resultado">
      <div class="res-icon">🎟️</div>
      <div class="res-body">
        <div class="res-title" style="color:rgba(255,255,255,.3)">Aguardando leitura</div>
        <div style="font-size:12px;opacity:.3;font-family:'IBM Plex Mono',monospace">Aponte a câmera para o QR Code</div>
      </div>
    </div>

    <!-- Manual -->
    <div class="manual-wrap">
      <label>🔤 Inserir código manualmente</label>
      <div class="manual-row">
        <input type="text" id="inp-manual" maxlength="8" placeholder="XXXXXXXX"
          onkeydown="if(event.key==='Enter') validarManual()">
        <button onclick="validarManual()">OK</button>
      </div>
    </div>

  </div>

  <!-- ── Log ── -->
  <div class="painel-log">
    <div class="log-header">
      <h2>📋 Registro</h2>
      <button onclick="limparLog()">Limpar</button>
    </div>
    <div class="log-stats">
      <div class="log-stat"><div class="n n-ok" id="ls-ok">0</div><div class="l">Válidos</div></div>
      <div class="log-stat"><div class="n n-erro" id="ls-erro">0</div><div class="l">Inválidos</div></div>
      <div class="log-stat"><div class="n n-warn" id="ls-warn">0</div><div class="l">Repetidos</div></div>
    </div>
    <div class="log-lista" id="log-lista">
      <div class="log-empty"><div class="icon">🎆</div>Nenhuma leitura ainda</div>
    </div>
  </div>
</main>

<script>
const STORAGE_KEY = 'festa-junina-ingressos';

let ingressos = [];
let videoStream = null;
let scannerAtivo = false;
let scanInterval = null;
let ultimoLido = null;
let ultimoLidoTs = 0;
let logItems = [];

// Contadores
let cntOk = 0, cntErro = 0, cntWarn = 0;

// ── Init ──
(async function() {
  await carregarStorage();
})();

async function carregarStorage() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) ingressos = JSON.parse(r.value);
  } catch(e) { ingressos = []; }
}

async function salvarStorage() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(ingressos));
  } catch(e) {}
}

// ── Câmera ──
async function toggleCamera() {
  if(scannerAtivo) {
    pararCamera();
  } else {
    iniciarCamera();
  }
}

async function iniciarCamera() {
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:640}, height:{ideal:640} }
    });
    const video = document.getElementById('video');
    video.srcObject = videoStream;
    video.play();

    scannerAtivo = true;
    document.getElementById('btn-cam').textContent = '⏹ Parar Câmera';
    document.getElementById('btn-cam').classList.add('parar');
    document.getElementById('camera-status').textContent = '● Câmera ativa — aponte para o QR Code';
    document.getElementById('camera-status').className = 'camera-status ativo';

    scanInterval = setInterval(lerFrame, 200);
  } catch(e) {
    alert('Não foi possível acessar a câmera. Verifique as permissões do navegador.');
  }
}

function pararCamera() {
  if(videoStream) videoStream.getTracks().forEach(t=>t.stop());
  videoStream = null;
  clearInterval(scanInterval);
  scannerAtivo = false;
  document.getElementById('btn-cam').textContent = '📷 Iniciar Câmera';
  document.getElementById('btn-cam').classList.remove('parar');
  document.getElementById('camera-status').textContent = 'Câmera inativa';
  document.getElementById('camera-status').className = 'camera-status';
}

function lerFrame() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if(video.readyState !== video.HAVE_ENOUGH_DATA) return;

  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height, {
    inversionAttempts: 'dontInvert'
  });

  if(code) {
    const agora = Date.now();
    // Debounce: mesmo código num intervalo de 2s
    if(code.data === ultimoLido && agora - ultimoLidoTs < 2000) return;
    ultimoLido = code.data;
    ultimoLidoTs = agora;
    validarCodigo(code.data.trim().toUpperCase());
  }
}

// ── Validar ──
async function validarCodigo(id) {
  await carregarStorage(); // atualizar estado

  const ing = ingressos.find(x => x.id.toUpperCase() === id);

  if(!ing) {
    exibirResultado('erro', '✕ Inválido', id, 'Código não encontrado no sistema', '');
    flash('erro');
    adicionarLog('erro', id, 'Código inválido');
    vibrar('erro');
    return;
  }

  if(ing.status === 'usado') {
    const quando = ing.usadoEm ? ' às ' + new Date(ing.usadoEm).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
    exibirResultado('warn', '⚠ Já Usado', ing.nome, `Ingresso utilizado${quando}`, ing.tipo);
    flash('warn');
    adicionarLog('warn', ing.nome, `Repetido — ${ing.tipo}`);
    vibrar('warn');
    return;
  }

  // ✅ Válido — marcar como usado
  ing.status = 'usado';
  ing.usadoEm = new Date().toISOString();
  await salvarStorage();

  exibirResultado('ok', '✓ Entrada Liberada', ing.nome,
    `${ing.tipo} · ${ing.escola || 'Festa Junina'}`, ing.tipo);
  flash('ok');
  adicionarLog('ok', ing.nome, ing.tipo);
  vibrar('ok');
  cntOk++;
  document.getElementById('cnt-ok').textContent = cntOk;
}

function exibirResultado(tipo, titulo, nome, detalhe, badge) {
  const el = document.getElementById('resultado');
  const icons = { ok:'🎉', erro:'🚫', warn:'⚠️' };
  el.className = 'resultado ' + tipo;
  el.innerHTML = `
    <div class="res-icon">${icons[tipo]}</div>
    <div class="res-body">
      <div class="res-title ${tipo}">${titulo}</div>
      <div class="res-nome">${nome}</div>
      ${detalhe ? `<div class="res-detail">🎟️ <span>${detalhe}</span></div>` : ''}
    </div>
  `;
}

function flash(tipo) {
  const el = document.getElementById('flash');
  el.className = 'flash ' + tipo;
  setTimeout(()=>{ el.className='flash'; }, 800);
}

function vibrar(tipo) {
  if(!navigator.vibrate) return;
  if(tipo==='ok')   navigator.vibrate([100]);
  if(tipo==='erro') navigator.vibrate([200,100,200]);
  if(tipo==='warn') navigator.vibrate([300]);
}

// ── Log ──
function adicionarLog(tipo, nome, detalhe) {
  const hora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logItems.unshift({tipo, nome, detalhe, hora});

  if(tipo==='ok')   cntErro, document.getElementById('ls-ok').textContent   = ++cntOk - cntOk + (parseInt(document.getElementById('ls-ok').textContent)||0) + 1;
  if(tipo==='erro') document.getElementById('ls-erro').textContent = (parseInt(document.getElementById('ls-erro').textContent)||0)+1;
  if(tipo==='warn') document.getElementById('ls-warn').textContent = (parseInt(document.getElementById('ls-warn').textContent)||0)+1;

  renderLog();
}

function renderLog() {
  const lista = document.getElementById('log-lista');
  if(!logItems.length) {
    lista.innerHTML = '<div class="log-empty"><div class="icon">🎆</div>Nenhuma leitura ainda</div>';
    return;
  }
  lista.innerHTML = logItems.slice(0,100).map(i => `
    <div class="log-item">
      <div class="log-dot dot-${i.tipo}"></div>
      <div class="log-item-body">
        <div class="log-item-nome">${i.nome}</div>
        <div class="log-item-detail">${i.detalhe}</div>
      </div>
      <div class="log-item-hora">${i.hora}</div>
    </div>
  `).join('');
}

// Fix: contar certo no log
(function fixContadores() {
  // redefine adicionarLog corretamente
  const _lsOk   = document.getElementById('ls-ok');
  const _lsErro  = document.getElementById('ls-erro');
  const _lsWarn  = document.getElementById('ls-warn');
  let _ok=0, _erro=0, _warn=0;

  window.adicionarLog = function(tipo, nome, detalhe) {
    const hora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    logItems.unshift({tipo, nome, detalhe, hora});
    if(tipo==='ok')   { _ok++;   _lsOk.textContent   = _ok; }
    if(tipo==='erro') { _erro++;  _lsErro.textContent = _erro; }
    if(tipo==='warn') { _warn++;  _lsWarn.textContent = _warn; }
    renderLog();
  };
})();

function limparLog() {
  logItems = [];
  renderLog();
  document.getElementById('ls-ok').textContent  = 0;
  document.getElementById('ls-erro').textContent = 0;
  document.getElementById('ls-warn').textContent = 0;
}

// ── Manual ──
function validarManual() {
  const v = document.getElementById('inp-manual').value.trim().toUpperCase();
  if(!v) return;
  validarCodigo(v);
  document.getElementById('inp-manual').value = '';
}
</script>
</body>
</html>
